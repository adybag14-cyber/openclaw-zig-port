name: release-preview

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag/version (for example v0.1.1-zig-preview.2)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-preview-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Zig version
        run: zig version

      - name: Zig master freshness snapshot (Codeberg with mirror fallback)
        shell: pwsh
        continue-on-error: true
        run: ./scripts/zig-codeberg-master-check.ps1 -OutputJsonPath zig-master-freshness.json

      - name: Zig GitHub mirror release snapshot
        shell: pwsh
        continue-on-error: true
        run: ./scripts/zig-github-mirror-release-check.ps1 -GitHubToken "${{ github.token }}" -OutputJsonPath zig-github-mirror-release.json -OutputMarkdownPath zig-github-mirror-release.md

      - name: Validate npm package (dry-run)
        working-directory: npm/openclaw-zig-rpc-client
        run: npm pack --dry-run

      - name: Validate python package (tests + build)
        shell: pwsh
        run: ./scripts/python-pack-check.ps1

      - name: Regenerate RPC reference
        shell: pwsh
        run: ./scripts/generate-rpc-reference.ps1

      - name: Verify RPC reference is up to date
        run: git diff --exit-code -- docs/rpc-reference.md

      - name: Method parity gate (Go latest release + original latest release + original latest beta)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -GitHubToken "${{ github.token }}" -GoTag v2.14.0-go -OriginalRef v2026.3.11 -OriginalBetaRef v2026.3.11-beta.1 -OutputJsonPath parity-go-zig.json -OutputMarkdownPath parity-go-zig.md

      - name: Docs status drift gate
        shell: pwsh
        run: ./scripts/docs-status-check.ps1 -ParityJsonPath parity-go-zig.json -GitHubToken "${{ github.token }}"

      - name: Package registry preflight
        shell: pwsh
        run: ./scripts/package-registry-status.ps1 -Repository "${{ github.repository }}" -ReleaseTag "${{ inputs.version }}" -NpmPackageName "@adybag14-cyber/openclaw-zig-rpc-client" -PythonPackageName "openclaw-zig-rpc-client" -OutputJsonPath package-registry-status.json -GitHubToken "${{ github.token }}"

      - name: Release status snapshot
        shell: pwsh
        run: ./scripts/release-status.ps1 -Repository "${{ github.repository }}" -ReleaseTag "${{ inputs.version }}" -PackageRegistryStatusPath package-registry-status.json -OutputJsonPath release-status.json -OutputMarkdownPath release-status.md -GitHubToken "${{ github.token }}"

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-methods
          path: |
            parity-go-zig.json
            parity-go-zig.md

      - name: Upload package registry preflight
        uses: actions/upload-artifact@v4
        with:
          name: package-registry-status
          path: package-registry-status.json

      - name: Upload release status snapshot
        uses: actions/upload-artifact@v4
        with:
          name: release-status
          path: |
            release-status.json
            release-status.md

      - name: Upload Zig freshness snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-master-freshness
          path: zig-master-freshness.json
          if-no-files-found: ignore

      - name: Upload Zig GitHub mirror release snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-github-mirror-release
          path: |
            zig-github-mirror-release.json
            zig-github-mirror-release.md
          if-no-files-found: ignore

      - name: Build and test baseline
        run: |
          zig build --summary all
          zig build test --summary all

      - name: Setup Zig (0.16.0-dev.2736+3b515fbed) for bare-metal validate lane
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0-dev.2736+3b515fbed
          use-cache: true

      - name: Export pinned Zig for bare-metal validate lane
        shell: bash
        run: |
          set -euo pipefail
          ZIG_BIN="$(command -v zig)"
          echo "OPENCLAW_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"
          echo "BAREMETAL_ZIG_BIN=${ZIG_BIN}" >> "$GITHUB_ENV"

      - name: Bare-metal validate Zig version
        shell: pwsh
        run: |
          Write-Output "BAREMETAL_ZIG_BIN=$env:BAREMETAL_ZIG_BIN"
          & $env:OPENCLAW_ZIG_BIN version

      - name: Bare-metal smoke check (freestanding build)
        shell: pwsh
        run: ./scripts/baremetal-smoke-check.ps1

      - name: Bare-metal QEMU smoke check (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-smoke-check.ps1 -SkipBuild

      - name: Bare-metal QEMU runtime probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-runtime-oc-tick-check.ps1

      - name: Bare-metal QEMU command-loop probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-command-loop-check.ps1

