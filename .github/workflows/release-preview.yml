        shell: pwsh
        run: ./scripts/baremetal-qemu-ata-storage-probe-check.ps1

      - name: Bare-metal QEMU RTL8139 probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-rtl8139-probe-check.ps1

      - name: Bare-metal QEMU RTL8139 ARP probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-rtl8139-arp-probe-check.ps1

      - name: Bare-metal QEMU RTL8139 IPv4 probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-rtl8139-ipv4-probe-check.ps1

      - name: Bare-metal QEMU RTL8139 UDP probe (optional)
        shell: pwsh
