name: release-preview

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag/version (for example v0.1.1-zig-preview.2)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-preview-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Zig version
        run: zig version

      - name: Validate npm package (dry-run)
        working-directory: npm/openclaw-zig-rpc-client
        run: npm pack --dry-run

      - name: Validate python package (tests + build)
        shell: pwsh
        run: ./scripts/python-pack-check.ps1

      - name: Regenerate RPC reference
        shell: pwsh
        run: ./scripts/generate-rpc-reference.ps1

      - name: Verify RPC reference is up to date
        run: git diff --exit-code -- docs/rpc-reference.md

      - name: Method parity gate (Go latest release + original latest release + original latest beta)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -GitHubToken "${{ github.token }}" -OutputJsonPath parity-go-zig.json -OutputMarkdownPath parity-go-zig.md

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-methods
          path: |
            parity-go-zig.json
            parity-go-zig.md

      - name: Build and test baseline
        run: |
          zig build --summary all
          zig build test --summary all

      - name: Bare-metal smoke check (freestanding build)
        shell: pwsh
        run: ./scripts/baremetal-smoke-check.ps1

      - name: Bare-metal QEMU smoke check (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-smoke-check.ps1 -SkipBuild

      - name: Runtime smoke check (serve + rpc)
        shell: pwsh
        run: ./scripts/runtime-smoke-check.ps1 -SkipBuild

      - name: Gateway auth smoke check (token gate for rpc + websocket)
        shell: pwsh
        run: ./scripts/gateway-auth-smoke-check.ps1 -SkipBuild

      - name: WebSocket smoke check (/ws rpc frames)
        shell: pwsh
        run: ./scripts/websocket-smoke-check.ps1 -SkipBuild

      - name: Update lifecycle smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/update-lifecycle-smoke-check.ps1 -SkipBuild

      - name: System maintenance smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/system-maintenance-smoke-check.ps1 -SkipBuild

  build-assets:
    runs-on: ubuntu-latest
    needs:
      - validate
    continue-on-error: ${{ matrix.optional }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            label: x86_64-windows
            binary: openclaw-zig.exe
            optional: false
          - target: x86_64-linux
            label: x86_64-linux
            binary: openclaw-zig
            optional: false
          - target: x86_64-macos
            label: x86_64-macos
            binary: openclaw-zig
            optional: false
          - target: x86_64-linux-android
            label: x86_64-android
            binary: openclaw-zig
            optional: false
          - target: aarch64-linux-android
            label: aarch64-android
            binary: openclaw-zig
            optional: false
          - target: arm-linux-androideabi
            label: armv7-android
            binary: openclaw-zig
            optional: false
          - target: aarch64-linux
            label: aarch64-linux
            binary: openclaw-zig
            optional: true
          - target: aarch64-macos
            label: aarch64-macos
            binary: openclaw-zig
            optional: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --summary all

      - name: Package zip + checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          LABEL="${{ matrix.label }}"
          BIN="${{ matrix.binary }}"
          ASSET="openclaw-zig-${VERSION}-${LABEL}.zip"

          mkdir -p out/stage
          cp "zig-out/bin/${BIN}" "out/stage/${BIN}"
          cp README.md out/stage/README.md
          (cd out/stage && zip -9 -r "../${ASSET}" .)
          sha256sum "out/${ASSET}" > "out/${ASSET}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            out/*.zip
            out/*.sha256

  build-baremetal-asset:
    runs-on: ubuntu-latest
    needs:
      - validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Build bare-metal artifact
        run: zig build baremetal -Doptimize=ReleaseFast --summary all

      - name: Package bare-metal artifact + checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          ASSET="openclaw-zig-${VERSION}-x86_64-freestanding-none.elf"

          mkdir -p out
          cp "zig-out/bin/openclaw-zig-baremetal.elf" "out/${ASSET}"
          sha256sum "out/${ASSET}" > "out/${ASSET}.sha256"

      - name: Upload bare-metal artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-baremetal
          path: |
            out/*.elf
            out/*.sha256

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-assets
      - build-baremetal-asset
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download parity report
        uses: actions/download-artifact@v4
        with:
          name: parity-methods
          path: dist

      - name: Build checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          : > dist/SHA256SUMS.txt
          for asset in dist/*.zip dist/*.elf; do
            if [ -f "${asset}" ]; then
              sha256sum "${asset}" >> dist/SHA256SUMS.txt
            fi
          done
          sed -i 's#dist/##g' dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ inputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release tag already exists: ${{ inputs.version }}"
            echo "Choose a new version tag before dispatching release-preview."
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=(dist/SHA256SUMS.txt)
          for zip in dist/*.zip; do
            if [ -f "${zip}" ]; then
              ASSETS+=("${zip}")
            fi
          done
          for elf in dist/*.elf; do
            if [ -f "${elf}" ]; then
              ASSETS+=("${elf}")
            fi
          done
          if [ -f dist/parity-go-zig.json ]; then
            ASSETS+=(dist/parity-go-zig.json)
          fi
          if [ -f dist/parity-go-zig.md ]; then
            ASSETS+=(dist/parity-go-zig.md)
          fi

          gh release create "${{ inputs.version }}" \
            "${ASSETS[@]}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.version }}" \
            --prerelease \
            --notes "Automated Zig preview release for ${{ inputs.version }} with full multi-target artifact matrix."
