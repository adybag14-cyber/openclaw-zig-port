name: release-preview

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag/version (for example v0.1.1-zig-preview.2)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-preview-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Method parity gate (Go latest release + original latest release)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -OutputJsonPath parity-go-zig.json -OutputMarkdownPath parity-go-zig.md

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-methods
          path: |
            parity-go-zig.json
            parity-go-zig.md

      - name: Build and test baseline
        run: |
          zig build --summary all
          zig build test --summary all

  build-assets:
    runs-on: ubuntu-latest
    needs:
      - validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-windows
            label: x86_64-windows
            binary: openclaw-zig.exe
          - target: x86_64-linux
            label: x86_64-linux
            binary: openclaw-zig
          - target: x86_64-macos
            label: x86_64-macos
            binary: openclaw-zig
          - target: aarch64-linux
            label: aarch64-linux
            binary: openclaw-zig
          - target: aarch64-macos
            label: aarch64-macos
            binary: openclaw-zig
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --summary all

      - name: Package zip + checksum
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          LABEL="${{ matrix.label }}"
          BIN="${{ matrix.binary }}"
          ASSET="openclaw-zig-${VERSION}-${LABEL}.zip"

          mkdir -p out/stage
          cp "zig-out/bin/${BIN}" "out/stage/${BIN}"
          cp README.md out/stage/README.md
          (cd out/stage && zip -9 -r "../${ASSET}" .)
          sha256sum "out/${ASSET}" > "out/${ASSET}.sha256"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            out/*.zip
            out/*.sha256

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-assets
    steps:
      - name: Download all packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Download parity report
        uses: actions/download-artifact@v4
        with:
          name: parity-methods
          path: dist

      - name: Build checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          : > dist/SHA256SUMS.txt
          for zip in dist/*.zip; do
            sha256sum "${zip}" >> dist/SHA256SUMS.txt
          done
          sed -i 's#dist/##g' dist/SHA256SUMS.txt
          cat dist/SHA256SUMS.txt

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${{ inputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release tag already exists: ${{ inputs.version }}"
            echo "Choose a new version tag before dispatching release-preview."
            exit 1
          fi

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSETS=(dist/*.zip dist/SHA256SUMS.txt)
          if [ -f dist/parity-go-zig.json ]; then
            ASSETS+=(dist/parity-go-zig.json)
          fi
          if [ -f dist/parity-go-zig.md ]; then
            ASSETS+=(dist/parity-go-zig.md)
          fi

          gh release create "${{ inputs.version }}" \
            "${ASSETS[@]}" \
            --repo "${{ github.repository }}" \
            --title "${{ inputs.version }}" \
            --prerelease \
            --notes "Automated Zig preview release for ${{ inputs.version }} with full multi-target artifact matrix."
