name: docs-pages

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs/**"
      - ".github/workflows/docs-pages.yml"
      - "README.md"
      - "src/gateway/registry.zig"
      - "scripts/generate-rpc-reference.ps1"
      - "requirements-docs.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-docs.txt

      - name: Regenerate RPC reference
        shell: pwsh
        run: ./scripts/generate-rpc-reference.ps1

      - name: Verify RPC reference is up to date
        run: git diff --exit-code -- docs/rpc-reference.md

      - name: Method parity gate snapshot (for docs status checks)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -GitHubToken "${{ github.token }}" -GoTag v2.14.0-go -OriginalRef v2026.3.2 -OriginalBetaRef v2026.3.2-beta.1 -OutputJsonPath parity-go-zig.json

      - name: Docs status drift gate
        shell: pwsh
        run: ./scripts/docs-status-check.ps1 -ParityJsonPath parity-go-zig.json -GitHubToken "${{ github.token }}"

      - name: Build docs
        run: mkdocs build --strict

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
