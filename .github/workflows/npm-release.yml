name: npm-release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version or tag to publish (for example v0.2.0-zig-edge or 0.2.0-zig-edge)
        required: true
        type: string
      dist_tag:
        description: npm dist-tag (for example latest or edge)
        required: false
        default: latest
        type: string
  release:
    types:
      - published

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve version and dist-tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION_RAW="${{ inputs.version }}"
            DIST_TAG="${{ inputs.dist_tag }}"
          else
            VERSION_RAW="${{ github.event.release.tag_name }}"
            if [ "${{ github.event.release.prerelease }}" = "true" ]; then
              DIST_TAG="edge"
            else
              DIST_TAG="latest"
            fi
          fi
          VERSION="${VERSION_RAW#v}"
          TAG="${VERSION_RAW}"
          if [[ "${TAG}" != v* ]]; then
            TAG="v${TAG}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "${VERSION}" ]; then
            echo "Resolved npm version is empty."
            exit 1
          fi
          if [ -z "${DIST_TAG}" ]; then
            DIST_TAG="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=${TAG}, version=${VERSION}, dist_tag=${DIST_TAG}"

      - name: Set package version
        working-directory: npm/openclaw-zig-rpc-client
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Validate npm package (dry-run)
        working-directory: npm/openclaw-zig-rpc-client
        run: npm pack --dry-run

      - name: Build npm tarball
        id: tarball
        shell: bash
        working-directory: npm/openclaw-zig-rpc-client
        run: |
          set -euo pipefail
          PACK_FILE="$(npm pack | tail -n 1)"
          if [ ! -f "${PACK_FILE}" ]; then
            echo "Failed to produce npm tarball."
            exit 1
          fi
          echo "file=${PACK_FILE}" >> "$GITHUB_OUTPUT"
          echo "tarball=$(pwd)/${PACK_FILE}" >> "$GITHUB_OUTPUT"
          echo "Built tarball: ${PACK_FILE}"

      - name: Package registry preflight
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ./scripts/package-registry-status.ps1 `
            -Repository "${{ github.repository }}" `
            -ReleaseTag "${{ steps.meta.outputs.tag }}" `
            -NpmPackageName "@adybag14-cyber/openclaw-zig-rpc-client" `
            -NpmVersion "${{ steps.meta.outputs.version }}" `
            -OutputJsonPath "./release/package-registry-status-npm.json"

      - name: Upload package registry preflight
        uses: actions/upload-artifact@v4
        with:
          name: package-registry-status-npm
          path: release/package-registry-status-npm.json

      - name: Detect npm token availability
        id: auth
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN}" ]; then
            echo "has_npm_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_npm_token=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload npm tarball to matching GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.meta.outputs.tag }}"
          FILE="${{ steps.tarball.outputs.tarball }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${FILE}" --repo "${{ github.repository }}" --clobber
            echo "Attached npm tarball to release ${TAG}."
          else
            echo "Release ${TAG} not found. Skipping tarball attach."
          fi

      - name: Publish npm package (npmjs)
        if: ${{ steps.auth.outputs.has_npm_token == 'true' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        working-directory: npm/openclaw-zig-rpc-client
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} already exists on npmjs. Skipping publish."
            exit 0
          fi
          npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}" --provenance

      - name: Publish npm package (npmjs trusted publishing)
        if: ${{ steps.auth.outputs.has_npm_token == 'false' }}
        id: npm_trusted
        continue-on-error: true
        shell: bash
        working-directory: npm/openclaw-zig-rpc-client
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} already exists on npmjs. Skipping trusted publish."
            exit 0
          fi
          unset NODE_AUTH_TOKEN
          npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}" --provenance

      - name: Setup Node for GitHub Packages fallback
        if: ${{ steps.auth.outputs.has_npm_token == 'false' && steps.npm_trusted.outcome == 'failure' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Publish npm package (GitHub Packages fallback)
        if: ${{ steps.auth.outputs.has_npm_token == 'false' && steps.npm_trusted.outcome == 'failure' }}
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: npm/openclaw-zig-rpc-client
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          VERSION="${{ steps.meta.outputs.version }}"
          if npm view "${PACKAGE_NAME}@${VERSION}" --registry https://npm.pkg.github.com >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${VERSION} already exists on GitHub Packages. Skipping fallback publish."
            exit 0
          fi
          npm publish --tag "${{ steps.meta.outputs.dist_tag }}" --registry https://npm.pkg.github.com

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## npm publish summary"
            echo ""
            echo "- tag: \`${{ steps.meta.outputs.tag }}\`"
            echo "- version: \`${{ steps.meta.outputs.version }}\`"
            echo "- dist-tag: \`${{ steps.meta.outputs.dist_tag }}\`"
            echo "- npm token configured: \`${{ steps.auth.outputs.has_npm_token }}\`"
            echo "- npmjs trusted publishing outcome: \`${{ steps.npm_trusted.outcome || 'not-run' }}\`"
            echo "- preflight artifact: \`package-registry-status-npm.json\`"
            if [ "${{ steps.auth.outputs.has_npm_token }}" = "false" ] && [ "${{ steps.npm_trusted.outcome }}" = "failure" ]; then
              echo "- public npmjs publish unavailable; fallback registry path used"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
