name: zig-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Build (Debug)
        run: zig build --summary all

      - name: Test
        run: zig build test --summary all

      - name: Go-to-Zig method parity gate
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -OutputJsonPath parity-go-zig.json

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-go-zig
          path: parity-go-zig.json

      - name: Build release (x86_64-linux)
        run: zig build -Dtarget=x86_64-linux -Doptimize=ReleaseFast --summary all

  cross-targets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-macos
            artifact_name: openclaw-zig-x86_64-macos
            binary_name: openclaw-zig
            optional: false
          - target: aarch64-linux
            artifact_name: openclaw-zig-aarch64-linux
            binary_name: openclaw-zig
            optional: true
          - target: aarch64-macos
            artifact_name: openclaw-zig-aarch64-macos
            binary_name: openclaw-zig
            optional: true
    continue-on-error: ${{ matrix.optional }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master)
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Zig version
        run: zig version

      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --summary all

      - name: Stage artifact
        run: |
          mkdir -p out
          cp zig-out/bin/${{ matrix.binary_name }} out/${{ matrix.binary_name }}
          cp README.md out/README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/**
