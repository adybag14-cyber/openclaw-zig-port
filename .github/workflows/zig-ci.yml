name: zig-ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: master
          use-cache: true

      - name: Setup Zig (master) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: master
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (master) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: master
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Zig version
        run: zig version

      - name: Zig master freshness snapshot (Codeberg with mirror fallback)
        shell: pwsh
        continue-on-error: true
        run: ./scripts/zig-codeberg-master-check.ps1 -OutputJsonPath zig-master-freshness.json

      - name: Validate npm package (dry-run)
        working-directory: npm/openclaw-zig-rpc-client
        run: npm pack --dry-run

      - name: Validate python package (tests + build)
        shell: pwsh
        run: ./scripts/python-pack-check.ps1

      - name: Regenerate RPC reference
        shell: pwsh
        run: ./scripts/generate-rpc-reference.ps1

      - name: Verify RPC reference is up to date
        run: git diff --exit-code -- docs/rpc-reference.md

      - name: Build (Debug)
        run: zig build --summary all

      - name: Test
        run: zig build test --summary all

      - name: Method parity gate (Go latest release + original latest release + original latest beta)
        shell: pwsh
        run: ./scripts/check-go-method-parity.ps1 -GitHubToken "${{ github.token }}" -GoTag v2.14.0-go -OriginalRef v2026.3.2 -OriginalBetaRef v2026.3.2-beta.1 -OutputJsonPath parity-go-zig.json -OutputMarkdownPath parity-go-zig.md

      - name: Docs status drift gate
        shell: pwsh
        run: ./scripts/docs-status-check.ps1 -ParityJsonPath parity-go-zig.json -GitHubToken "${{ github.token }}"

      - name: Upload parity report
        uses: actions/upload-artifact@v4
        with:
          name: parity-methods
          path: |
            parity-go-zig.json
            parity-go-zig.md

      - name: Upload Zig freshness snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zig-master-freshness
          path: zig-master-freshness.json
          if-no-files-found: ignore

      - name: Build release (x86_64-linux)
        run: zig build -Dtarget=x86_64-linux -Doptimize=ReleaseFast --summary all

      - name: Bare-metal smoke check (freestanding build)
        shell: pwsh
        run: ./scripts/baremetal-smoke-check.ps1

      - name: Bare-metal QEMU smoke check (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-smoke-check.ps1 -SkipBuild

      - name: Bare-metal QEMU runtime probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-runtime-oc-tick-check.ps1

      - name: Bare-metal QEMU command-loop probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-command-loop-check.ps1

      - name: Bare-metal QEMU feature flags tick batch probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-feature-flags-tick-batch-probe-check.ps1

      - name: Bare-metal QEMU descriptor bootdiag probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-descriptor-bootdiag-probe-check.ps1

      - name: Bare-metal QEMU bootdiag history clear probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-bootdiag-history-clear-probe-check.ps1

      - name: Bare-metal QEMU descriptor table content probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-descriptor-table-content-probe-check.ps1

      - name: Bare-metal QEMU descriptor dispatch probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-descriptor-dispatch-probe-check.ps1

      - name: Bare-metal QEMU vector counter reset probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-vector-counter-reset-probe-check.ps1

      - name: Bare-metal QEMU vector history overflow probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-vector-history-overflow-probe-check.ps1

      - name: Bare-metal QEMU vector history clear probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-vector-history-clear-probe-check.ps1

      - name: Bare-metal QEMU command-health history probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-command-health-history-probe-check.ps1

      - name: Bare-metal QEMU mode/boot-phase history probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-mode-boot-phase-history-probe-check.ps1

      - name: Bare-metal QEMU mode/boot-phase setter probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-mode-boot-phase-setter-probe-check.ps1

      - name: Bare-metal QEMU mode/boot-phase history clear probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-mode-boot-phase-history-clear-probe-check.ps1

      - name: Runtime smoke check (serve + rpc)
        shell: pwsh
        run: ./scripts/runtime-smoke-check.ps1 -SkipBuild

      - name: Gateway auth smoke check (token gate for rpc + websocket)
        shell: pwsh
        run: ./scripts/gateway-auth-smoke-check.ps1 -SkipBuild

      - name: WebSocket smoke check (/ws rpc frames)
        shell: pwsh
        run: ./scripts/websocket-smoke-check.ps1 -SkipBuild

      - name: Update lifecycle smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/update-lifecycle-smoke-check.ps1 -SkipBuild

      - name: System maintenance smoke check (plan/run/status)
        shell: pwsh
        run: ./scripts/system-maintenance-smoke-check.ps1 -SkipBuild

      - name: Appliance control-plane smoke check (boot/rollback/update gate)
        shell: pwsh
        run: ./scripts/appliance-control-plane-smoke-check.ps1 -SkipBuild

      - name: Appliance restart recovery smoke check (persisted control-plane replay)
        shell: pwsh
        run: ./scripts/appliance-restart-recovery-smoke-check.ps1 -SkipBuild

      - name: Appliance rollout boundary smoke check (canary to stable promotion)
        shell: pwsh
        run: ./scripts/appliance-rollout-boundary-smoke-check.ps1 -SkipBuild

      - name: Appliance minimal profile smoke check (readiness contract)
        shell: pwsh
        run: ./scripts/appliance-minimal-profile-smoke-check.ps1 -SkipBuild

      - name: Bare-metal QEMU scheduler probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-probe-check.ps1

      - name: Bare-metal QEMU scheduler priority budget probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-priority-budget-probe-check.ps1

      - name: Bare-metal QEMU scheduler round robin probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-round-robin-probe-check.ps1

      - name: Bare-metal QEMU scheduler timeslice update probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-timeslice-update-probe-check.ps1

      - name: Bare-metal QEMU scheduler disable enable probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-disable-enable-probe-check.ps1

      - name: Bare-metal QEMU scheduler reset probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-reset-probe-check.ps1

      - name: Bare-metal QEMU scheduler policy switch probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-policy-switch-probe-check.ps1

      - name: Bare-metal QEMU scheduler saturation probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-scheduler-saturation-probe-check.ps1

      - name: Bare-metal QEMU timer wake probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-wake-probe-check.ps1

      - name: Bare-metal QEMU timer quantum probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-quantum-probe-check.ps1

      - name: Bare-metal QEMU timer cancel task probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-cancel-task-probe-check.ps1

      - name: Bare-metal QEMU timer cancel probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-cancel-probe-check.ps1

      - name: Bare-metal QEMU timer pressure probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-pressure-probe-check.ps1

      - name: Bare-metal QEMU periodic timer probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-periodic-timer-probe-check.ps1

      - name: Bare-metal QEMU periodic timer clamp probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-periodic-timer-clamp-probe-check.ps1

      - name: Bare-metal QEMU periodic interrupt probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-periodic-interrupt-probe-check.ps1

      - name: Bare-metal QEMU interrupt timeout probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-timeout-probe-check.ps1

      - name: Bare-metal QEMU interrupt timeout timer probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-timeout-timer-probe-check.ps1

      - name: Bare-metal QEMU interrupt timeout clamp probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-timeout-clamp-probe-check.ps1

      - name: Bare-metal QEMU interrupt filter probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-filter-probe-check.ps1

      - name: Bare-metal QEMU timer-disable interrupt probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-timer-disable-interrupt-probe-check.ps1

      - name: Bare-metal QEMU interrupt mask profile probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-mask-profile-probe-check.ps1

      - name: Bare-metal QEMU wake queue selective probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-selective-probe-check.ps1

      - name: Bare-metal QEMU wake queue selective overflow probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-selective-overflow-probe-check.ps1

      - name: Bare-metal QEMU wake queue before tick overflow probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-before-tick-overflow-probe-check.ps1

      - name: Bare-metal QEMU wake queue reason overflow probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-reason-overflow-probe-check.ps1

      - name: Bare-metal QEMU wake queue FIFO probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-fifo-probe-check.ps1

      - name: Bare-metal QEMU wake queue summary age probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-summary-age-probe-check.ps1

      - name: Bare-metal QEMU wake queue batch pop probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-batch-pop-probe-check.ps1

      - name: Bare-metal QEMU wake queue overflow probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-overflow-probe-check.ps1

      - name: Bare-metal QEMU wake queue clear probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-wake-queue-clear-probe-check.ps1

      - name: Bare-metal QEMU allocator syscall probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-allocator-syscall-probe-check.ps1

      - name: Bare-metal QEMU syscall control probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-syscall-control-probe-check.ps1

      - name: Bare-metal QEMU allocator syscall failure probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-allocator-syscall-failure-probe-check.ps1

      - name: Bare-metal QEMU command result counters probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-command-result-counters-probe-check.ps1

      - name: Bare-metal QEMU reset counters probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-reset-counters-probe-check.ps1

      - name: Bare-metal QEMU task lifecycle probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-task-lifecycle-probe-check.ps1

      - name: Bare-metal QEMU active-task terminate probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-active-task-terminate-probe-check.ps1

      - name: Bare-metal QEMU panic recovery probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-panic-recovery-probe-check.ps1

      - name: Bare-metal QEMU panic wake recovery probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-panic-wake-recovery-probe-check.ps1

      - name: Bare-metal QEMU manual wait interrupt probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-manual-wait-interrupt-probe-check.ps1

      - name: Bare-metal QEMU interrupt mask exception probe (optional)
        shell: pwsh
        run: ./scripts/baremetal-qemu-interrupt-mask-exception-probe-check.ps1

  cross-targets:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-macos
            artifact_name: openclaw-zig-x86_64-macos
            binary_name: openclaw-zig
            optional: false
          - target: x86_64-linux-android
            artifact_name: openclaw-zig-x86_64-android
            binary_name: openclaw-zig
            optional: false
          - target: aarch64-linux-android
            artifact_name: openclaw-zig-aarch64-android
            binary_name: openclaw-zig
            optional: false
          - target: arm-linux-androideabi
            artifact_name: openclaw-zig-armv7-android
            binary_name: openclaw-zig
            optional: false
          - target: aarch64-linux
            artifact_name: openclaw-zig-aarch64-linux
            binary_name: openclaw-zig
            optional: true
          - target: aarch64-macos
            artifact_name: openclaw-zig-aarch64-macos
            binary_name: openclaw-zig
            optional: true
    continue-on-error: ${{ matrix.optional }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig (master) primary
        id: setup_zig_primary
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: master
          use-cache: true

      - name: Setup Zig (master) mirror fallback
        id: setup_zig_mirror_mach
        if: steps.setup_zig_primary.outcome == 'failure'
        continue-on-error: true
        uses: mlugg/setup-zig@v2
        with:
          version: master
          mirror: https://pkg.machengine.org/zig
          use-cache: true

      - name: Setup Zig (master) mirror fallback (ziglang.org)
        if: steps.setup_zig_primary.outcome == 'failure' && steps.setup_zig_mirror_mach.outcome == 'failure'
        uses: mlugg/setup-zig@v2
        with:
          version: master
          mirror: https://ziglang.org/builds
          use-cache: true

      - name: Zig version
        run: zig version

      - name: Build release target
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseFast --summary all

      - name: Stage artifact
        run: |
          mkdir -p out
          cp zig-out/bin/${{ matrix.binary_name }} out/${{ matrix.binary_name }}
          cp README.md out/README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: out/**
